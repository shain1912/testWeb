<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 작품 전시관</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Malgun Gothic', sans-serif;
    background: linear-gradient(135deg, #eef2ff 0%, #fdf2f8 100%);
    min-height: 100vh;
    color: #1a1a1a;
  }
  header {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 18px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 50;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  h1 {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .actions { display: flex; gap: 8px; align-items: center; }
  .data-source {
    font-size: 12px;
    color: #6b7280;
    margin-right: 4px;
  }
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn-primary {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: white;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
  .btn-secondary { background: #e5e7eb; color: #374151; }
  .btn-secondary:hover { background: #d1d5db; }
  .btn-icon {
    width: 36px; height: 36px;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    background: #f3f4f6;
    color: #4b5563;
    border-radius: 8px;
    font-size: 16px;
  }
  .btn-icon:hover { background: #e5e7eb; }

  .container { max-width: 1400px; margin: 0 auto; padding: 32px 20px; }

  .admin-panel {
    background: white;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 28px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .admin-panel h2 { font-size: 17px; margin-bottom: 14px; color: #374151; }
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: stretch; }
  .form-row input {
    flex: 1;
    min-width: 180px;
    padding: 10px 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }
  .form-row input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
  .form-row button { white-space: nowrap; }
  .help-text {
    margin-top: 14px;
    padding: 12px 14px;
    background: #f9fafb;
    border-radius: 8px;
    font-size: 12.5px;
    color: #4b5563;
    line-height: 1.7;
  }
  .help-text code {
    background: #e5e7eb;
    padding: 1px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 12px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
    gap: 24px;
  }
  .card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .card-header {
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #f3f4f6;
    gap: 12px;
  }
  .student-info { flex: 1; min-width: 0; }
  .student-name {
    font-size: 17px;
    font-weight: 700;
    color: #1f2937;
    cursor: pointer;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .student-name:hover { color: #6366f1; }
  .student-desc {
    font-size: 12px;
    color: #6b7280;
    margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    width: 32px; height: 32px;
    border: none;
    background: #f3f4f6;
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    color: #6b7280;
    text-decoration: none;
    font-size: 16px;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: #e5e7eb; color: #1f2937; }
  .icon-btn.danger:hover { background: #fee2e2; color: #dc2626; }
  .card-iframe {
    width: 100%;
    height: 480px;
    border: none;
    display: block;
    background: #f9fafb;
  }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: #9ca3af;
  }
  .empty-icon { font-size: 56px; margin-bottom: 16px; }
  .empty-text { font-size: 18px; margin-bottom: 8px; color: #6b7280; }
  .empty-hint { font-size: 14px; }

  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    flex-direction: column;
  }
  .lightbox.open { display: flex; }
  .lightbox-header {
    padding: 14px 24px;
    background: rgba(0,0,0,0.5);
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .lightbox-title { font-size: 18px; font-weight: 700; }
  .lightbox-desc { font-size: 13px; opacity: 0.7; margin-top: 2px; }
  .lightbox-url { font-size: 11px; opacity: 0.5; margin-top: 2px; word-break: break-all; }
  .lightbox-actions { display: flex; gap: 8px; }
  .lightbox iframe { flex: 1; width: 100%; border: none; background: white; }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: #1f2937;
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    transition: transform 0.3s;
    z-index: 200;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
    .card-iframe { height: 400px; }
    h1 { font-size: 18px; }
    header { padding: 14px 16px; }
    .container { padding: 20px 12px; }
  }
</style>
</head>
<body>
  <header>
    <h1>🎨 학생 작품 전시관</h1>
    <div class="actions">
      <span class="data-source" id="dataSource"></span>
      <button class="btn-icon" id="importBtn" style="display:none;" title="JSON 가져오기">📥</button>
      <button class="btn-icon" id="exportBtn" style="display:none;" title="JSON 내보내기">📤</button>
      <button class="btn btn-primary" id="adminBtn">관리</button>
    </div>
  </header>

  <div class="container">
    <div class="admin-panel" id="adminPanel" style="display:none;">
      <h2>➕ 학생 작품 추가</h2>
      <form class="form-row" id="addForm">
        <input type="text" id="inputName" placeholder="학생 이름 (예: 김민수)" required>
        <input type="text" id="inputDesc" placeholder="작품 설명 (선택)">
        <input type="url" id="inputUrl" placeholder="배포 URL (https://...)" required>
        <button type="submit" class="btn btn-primary">추가</button>
      </form>
      <div class="help-text">
        💡 <strong>사용 방법</strong><br>
        1. 학생 이름과 배포된 사이트 URL을 입력하고 "추가" 버튼을 누르세요.<br>
        2. <strong>다른 사람에게도 보이게 하려면</strong> 📤 내보내기로 <code>students.json</code>을 받아 저장소에 커밋·푸시하세요.<br>
        3. 데이터는 <code>students.json</code> 파일이 있으면 그 파일을, 없으면 브라우저 저장소를 사용합니다.
      </div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-header">
      <div>
        <div class="lightbox-title" id="lightboxName"></div>
        <div class="lightbox-desc" id="lightboxDesc"></div>
        <div class="lightbox-url" id="lightboxUrl"></div>
      </div>
      <div class="lightbox-actions">
        <a id="lightboxLink" target="_blank" rel="noopener" class="btn btn-secondary">↗ 새 창</a>
        <button class="btn btn-secondary" onclick="closeLightbox()">닫기 (ESC)</button>
      </div>
    </div>
    <iframe id="lightboxIframe"></iframe>
  </div>

  <input type="file" id="fileInput" accept=".json,application/json" style="display:none;">

  <div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'students';
let students = [];
let adminMode = false;
let dataSource = 'local';

async function loadStudents() {
  try {
    const res = await fetch('students.json', { cache: 'no-cache' });
    if (res.ok) {
      const data = await res.json();
      students = Array.isArray(data) ? data : [];
      dataSource = 'json';
      updateSourceLabel();
      render();
      return;
    }
  } catch (e) {}
  const stored = localStorage.getItem(STORAGE_KEY);
  students = stored ? JSON.parse(stored) : [];
  dataSource = 'local';
  updateSourceLabel();
  render();
}

function updateSourceLabel() {
  const el = document.getElementById('dataSource');
  el.textContent = dataSource === 'json' ? '📁 students.json' : '💾 브라우저 저장';
  el.title = dataSource === 'json'
    ? 'students.json 파일에서 데이터를 불러왔습니다'
    : '브라우저 로컬 저장소에서 데이터를 불러왔습니다';
}

function saveStudents() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(students));
}

function render() {
  const grid = document.getElementById('grid');
  if (students.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🎨</div>
        <div class="empty-text">아직 등록된 작품이 없습니다</div>
        <div class="empty-hint">${adminMode ? '위 폼에서 학생을 추가해보세요' : '우측 상단 "관리" 버튼을 눌러 학생을 추가하세요'}</div>
      </div>
    `;
    return;
  }
  grid.innerHTML = students.map((s, i) => `
    <div class="card">
      <div class="card-header">
        <div class="student-info">
          <div class="student-name" onclick="openLightbox(${i})" title="클릭하여 크게 보기">${escapeHtml(s.name)}</div>
          ${s.desc ? `<div class="student-desc">${escapeHtml(s.desc)}</div>` : ''}
        </div>
        <div class="card-actions">
          <button class="icon-btn" onclick="openLightbox(${i})" title="확대">⛶</button>
          <a href="${escapeAttr(s.url)}" target="_blank" rel="noopener" class="icon-btn" title="새 창에서 열기">↗</a>
          ${adminMode ? `<button class="icon-btn danger" onclick="removeStudent(${i})" title="삭제">×</button>` : ''}
        </div>
      </div>
      <iframe class="card-iframe" src="${escapeAttr(s.url)}" loading="lazy" referrerpolicy="no-referrer"></iframe>
    </div>
  `).join('');
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function escapeAttr(s) { return escapeHtml(s); }

function addStudent(name, desc, url) {
  students.push({ name, desc, url });
  saveStudents();
  render();
  showToast(`✅ ${name} 학생의 작품을 추가했습니다`);
}

function removeStudent(i) {
  if (confirm(`"${students[i].name}" 학생의 작품을 삭제할까요?`)) {
    const name = students[i].name;
    students.splice(i, 1);
    saveStudents();
    render();
    showToast(`🗑️ ${name} 학생의 작품을 삭제했습니다`);
  }
}

function openLightbox(i) {
  const s = students[i];
  document.getElementById('lightboxName').textContent = s.name;
  document.getElementById('lightboxDesc').textContent = s.desc || '';
  document.getElementById('lightboxUrl').textContent = s.url;
  document.getElementById('lightboxLink').href = s.url;
  document.getElementById('lightboxIframe').src = s.url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxIframe').src = 'about:blank';
}
document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target.id === 'lightbox') closeLightbox();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeLightbox();
});

function toggleAdmin() {
  adminMode = !adminMode;
  document.getElementById('adminPanel').style.display = adminMode ? 'block' : 'none';
  document.getElementById('exportBtn').style.display = adminMode ? 'inline-flex' : 'none';
  document.getElementById('importBtn').style.display = adminMode ? 'inline-flex' : 'none';
  document.getElementById('adminBtn').textContent = adminMode ? '✓ 관리 완료' : '관리';
  document.getElementById('adminBtn').className = adminMode ? 'btn btn-secondary' : 'btn btn-primary';
  render();
}

document.getElementById('adminBtn').addEventListener('click', toggleAdmin);

document.getElementById('addForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const name = document.getElementById('inputName').value.trim();
  const desc = document.getElementById('inputDesc').value.trim();
  const url = document.getElementById('inputUrl').value.trim();
  if (name && url) {
    addStudent(name, desc, url);
    e.target.reset();
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(students, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'students.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('📤 students.json 다운로드 완료');
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        students = data;
        saveStudents();
        render();
        showToast(`📥 ${data.length}명의 학생 데이터를 가져왔습니다`);
      } else {
        showToast('⚠️ 올바른 JSON 형식이 아닙니다');
      }
    } catch (err) {
      showToast('⚠️ 파일을 읽을 수 없습니다');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2500);
}

loadStudents();
</script>
</body>
</html>
